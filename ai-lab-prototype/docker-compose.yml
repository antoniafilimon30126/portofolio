services:
  backend:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env

  frontend:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - .:/app
    command: >
      sh -c "pip install --no-cache-dir streamlit requests &&
             streamlit run app.py --server.port=8501 --server.address=0.0.0.0"
    ports:
      - "8501:8501"
    environment:
      BACKEND_URL: http://backend:8000/chat
    depends_on:
      - backend
